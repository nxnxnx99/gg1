<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHOF RAFI - Luxury Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #d4af37; /* Gold */
            --bg: #0a0a0a;
            --card-bg: #1a1a1a;
            --text: #ffffff;
            --accent: #ff4d4d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; }

        /* --- NAVIGATION --- */
        nav {
            background: rgba(0, 0, 0, 0.95);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--primary);
        }

        .logo { font-size: 1.8rem; font-weight: bold; color: var(--primary); letter-spacing: 2px; }

        .nav-links button {
            background: none;
            border: none;
            color: white;
            margin-left: 20px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
        }

        .nav-links button:hover { color: var(--primary); }

        /* --- PAGES --- */
        .page { display: none; padding: 100px 5% 50px; min-height: 100vh; animation: fadeIn 0.5s ease; }
        .active-page { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- HOME HERO --- */
        .hero { text-align: center; padding: 100px 0; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&q=80&w=2070') center/cover; border-radius: 15px; }
        .hero h1 { font-size: 3.5rem; margin-bottom: 20px; color: var(--primary); }
        .btn-main { background: var(--primary); color: black; padding: 12px 30px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        .btn-main:hover { transform: scale(1.05); background: #f1c40f; }

        /* --- MARKET GRID --- */
        .market-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin-top: 30px; }
        .product-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; transition: 0.3s; border: 1px solid #333; position: relative; }
        .product-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .product-img { width: 100%; height: 200px; object-fit: cover; background: #222; }
        .product-info { padding: 15px; }
        .product-price { color: var(--primary); font-size: 1.2rem; font-weight: bold; margin: 10px 0; }
        .product-actions { display: flex; justify-content: space-between; align-items: center; }
        
        .btn-buy { background: #25d366; color: white; padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 0.9rem; }
        .btn-delete { background: var(--accent); color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; }

        /* --- SELL FORM --- */
        .sell-container { max-width: 600px; margin: 0 auto; background: var(--card-bg); padding: 30px; border-radius: 15px; border: 1px solid var(--primary); }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--primary); }
        input, textarea, select { width: 100%; padding: 12px; background: #222; border: 1px solid #444; color: white; border-radius: 5px; }
        
        /* --- LOGIN SECTION --- */
        .login-box { max-width: 400px; margin: 50px auto; text-align: center; background: var(--card-bg); padding: 40px; border-radius: 15px; border: 1px solid var(--primary); }
        .google-btn { background: white; color: black; width: 100%; padding: 12px; border: none; border-radius: 5px; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">CHOF RAFI</div>
        <div class="nav-links">
            <button onclick="switchTab('home')">HOME</button>
            <button onclick="switchTab('market')">MARKET</button>
            <button onclick="switchTab('sell')">SELL</button>
            <button id="btn-login" onclick="handleAuthClick()">LOGIN</button>
        </div>
    </nav>

    <div id="home-section" class="page active-page">
        <div class="hero">
            <h1>PREMIUM TECH STORE</h1>
            <p>Buy and Sell High-End Components Locally</p>
            <button class="btn-main" onclick="switchTab('market')">EXPLORE MARKET</button>
        </div>
    </div>

    <div id="market-section" class="page">
        <h2 style="color: var(--primary); border-bottom: 2px solid var(--primary); display: inline-block; padding-bottom: 5px;">LIVE LISTINGS</h2>
        <div id="market-display" class="market-grid">
            </div>
    </div>

    <div id="sell-section" class="page">
        <div class="sell-container">
            <h2 style="text-align: center; margin-bottom: 25px;">PUBLISH YOUR PRODUCT</h2>
            <div class="form-group">
                <label>Product Name *</label>
                <input type="text" id="s-name" placeholder="e.g. RTX 4090 Rog Strix">
            </div>
            <div class="form-group">
                <label>Price (DA) *</label>
                <input type="number" id="s-price" placeholder="Price in Dinar">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="s-desc" rows="3" placeholder="Condition, Warranty, etc."></textarea>
            </div>
            <div class="form-group">
                <label>Phone Number (for WhatsApp)</label>
                <input type="text" id="s-phone" placeholder="05XXXXXXXX">
            </div>
            <div class="form-group">
                <label>Product Image</label>
                <input type="file" id="s-image" accept="image/*">
            </div>
            <button class="btn-main" style="width: 100%;" onclick="publishProduct()">POST TO MARKET</button>
        </div>
    </div>

    <div id="login-section" class="page">
        <div class="login-box">
            <h2 id="auth-title">Welcome Back</h2>
            <div id="user-info" style="display: none; margin-bottom: 20px;">
                <img id="user-pic" style="border-radius: 50%; width: 80px; border: 2px solid var(--primary);">
                <h3 id="user-name" style="margin-top: 10px;"></h3>
                <p id="user-email" style="color: #888;"></p>
                <button class="btn-main" style="background: var(--accent); color: white;" onclick="userLogout()">LOGOUT</button>
            </div>
            <div id="login-controls">
                <p>Sign in to post products and manage your listings</p>
                <button class="google-btn" onclick="handleGoogleLogin()">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="20">
                    Continue with Google
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Your Exact Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBvYT2zroIh4fEUu1XMeutMBHK_kVkzGKQ",
            authDomain: "pc-store-56dfd.firebaseapp.com",
            projectId: "pc-store-56dfd",
            storageBucket: "pc-store-56dfd.firebasestorage.app",
            messagingSenderId: "88997198692",
            appId: "1:88997198692:web:5ae9eb07e8f3592c059871",
            measurementId: "G-MYHQ9KJ1J3"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore(app);

        // Global State
        window.productList = [];
        window.currentUser = null;
        window.userRole = 'guest';

        // --- NAVIGATION LOGIC ---
        window.switchTab = (tabId) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(tabId + '-section').classList.add('active-page');
            if(tabId === 'market') initMarket();
        };

        // --- AUTH LOGIC ---
        window.handleAuthClick = () => switchTab('login');

        window.handleGoogleLogin = async () => {
            const provider = new GoogleAuthProvider();
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                alert("Login Failed: " + error.message);
            }
        };

        window.userLogout = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, (user) => {
            const btnLogin = document.getElementById('btn-login');
            const loginControls = document.getElementById('login-controls');
            const userInfo = document.getElementById('user-info');

            if (user) {
                window.currentUser = user;
                btnLogin.innerText = "MY ACCOUNT";
                loginControls.style.display = 'none';
                userInfo.style.display = 'block';
                document.getElementById('user-pic').src = user.photoURL;
                document.getElementById('user-name').innerText = user.displayName;
                document.getElementById('user-email').innerText = user.email;
                
                // Admin logic (Optional)
                if(user.email === 'your-admin-email@gmail.com') window.userRole = 'owner';
            } else {
                window.currentUser = null;
                btnLogin.innerText = "LOGIN";
                loginControls.style.display = 'block';
                userInfo.style.display = 'none';
            }
        });

        // --- FIRESTORE MARKET LOGIC ---
        window.initMarket = () => {
            const q = query(collection(db, "products"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snapshot) => {
                window.productList = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderProducts();
            });
        };

        window.renderProducts = () => {
            const display = document.getElementById('market-display');
            display.innerHTML = '';

            window.productList.forEach((product, index) => {
                const card = document.createElement('div');
                card.className = 'product-card';
                
                // WhatsApp Link Generation
                const waLink = `https://wa.me/${product.phone}?text=Hello, I am interested in [${product.name}] for ${product.price} DA`;

                card.innerHTML = `
                    <img src="${product.image || 'https://via.placeholder.com/300x200?text=No+Image'}" class="product-img">
                    <div class="product-info">
                        <h3>${product.name}</h3>
                        <p style="color: #aaa; font-size: 0.8rem;">${product.desc}</p>
                        <p class="product-price">${product.price} DA</p>
                        <div class="product-actions">
                            <a href="${waLink}" target="_blank" class="btn-buy"><i class="fab fa-whatsapp"></i> CONTACT</a>
                            ${window.userRole === 'owner' ? `<button class="btn-delete" onclick="deleteProduct('${product.id}')"><i class="fas fa-trash"></i></button>` : ''}
                        </div>
                    </div>
                `;
                display.appendChild(card);
            });
        };

        window.publishProduct = async () => {
            if (!window.currentUser) return alert("Please Login First!");

            const name = document.getElementById('s-name').value;
            const price = document.getElementById('s-price').value;
            const desc = document.getElementById('s-desc').value;
            const phone = document.getElementById('s-phone').value;
            const imageInput = document.getElementById('s-image');

            if (!name || !price || !phone) return alert("Fill Name, Price and Phone!");

            const saveToFirestore = async (imgBase64) => {
                try {
                    await addDoc(collection(db, "products"), {
                        name, price, desc, phone,
                        image: imgBase64,
                        userId: window.currentUser.uid,
                        userEmail: window.currentUser.email,
                        createdAt: serverTimestamp()
                    });
                    alert("PRODUCT PUBLISHED SUCCESSFULLY!");
                    switchTab('market');
                } catch (e) { alert("Error: " + e.message); }
            };

            if (imageInput.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => saveToFirestore(e.target.result);
                reader.readAsDataURL(imageInput.files[0]);
            } else {
                saveToFirestore(null);
            }
        };

        window.deleteProduct = async (docId) => {
            if (confirm("Delete this listing permanently?")) {
                await deleteDoc(doc(db, "products", docId));
            }
        };

        // Start listening to market data on load
        initMarket();
    </script>
</body>
</html>
